<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b.koolll - Nail Artist - Phoenix, AZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="1.jpg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
body { font-family: 'Jost', Helvetica, Arial, sans-serif; background: #fbf8f2; color: #33403a; overflow-x: hidden; width: 100%; max-width: 100%; }
#root { overflow-x: hidden; width: 100%; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #a9c9d6; border-radius: 3px; }

.gsap-fade { opacity: 0; transform: translateY(30px); }
.gsap-fade-left { opacity: 0; transform: translateX(-40px); }
.gsap-fade-right { opacity: 0; transform: translateX(40px); }
.gsap-scale { opacity: 0; transform: scale(0.92); }
.hero-title { overflow: hidden; }
.hero-title-inner { display: block; }

.lightbox-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(30, 35, 32, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.lightbox-overlay.open { opacity: 1; pointer-events: all; }
.lightbox-overlay img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 4px; }
.lightbox-close {
  position: absolute;
  top: 24px;
  right: 28px;
  color: #fffdf9;
  font-size: 32px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
  line-height: 1;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fffdf9;
  font-size: 36px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
  user-select: none;
  padding: 16px;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-nav.prev { left: 16px; }
.lightbox-nav.next { right: 16px; }

.mobile-menu-btn { display: none; }
button, a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

@media (max-width: 767px) {
  .desktop-nav { display: none !important; }
  .mobile-menu-btn { display: flex !important; }
  .about-grid { grid-template-columns: 1fr !important; }
  .about-grid > div:last-child { order: -1; }
  .photo-mosaic { grid-template-columns: 1fr 1fr !important; }
  .photo-mosaic > div { height: 130px !important; }
  .gallery-grid { grid-template-columns: 1fr 1fr !important; grid-auto-rows: 150px !important; }
  .gallery-tall { grid-row: span 1 !important; }
  .hero-ctas, .booking-ctas { flex-direction: column !important; align-items: stretch !important; }
  .hero-ctas > *, .booking-ctas > * { width: 100% !important; justify-content: center !important; }
  .stats-row { gap: 28px !important; margin-top: 44px !important; }
}

@media (max-width: 479px) {
  .footer-grid { grid-template-columns: 1fr !important; }
  .gallery-grid { grid-template-columns: 1fr !important; }
  .gallery-wide { grid-column: span 1 !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { gsap } = window;
const { ScrollTrigger } = window;
gsap.registerPlugin(ScrollTrigger);

const BOOKING_URL = 'https://instagram.com/b.koolll';
const INSTAGRAM_URL = 'https://instagram.com/b.koolll';
const INSTAGRAM_HANDLE = '@b.koolll';

const T = {
  blush: '#f6c9d4',
  blushDp: '#e2a3b4',
  blushLt: '#fbf8f2',
  rose: '#e2a3b4',
  roseDp: '#b97e8f',
  roseLt: '#f6dde3',
  warmWhite: '#fffdf9',
  bgAlt: '#fbf8f2',
  text: '#33403a',
  text2: '#5c6b62',
  text3: '#8a978e',
  border: '#e6ddce',
  white: '#fffdf9',
  dark: '#e9ecdf',
  darkDeep: '#7c9485',
};

const serif = "'Cormorant Garamond', Georgia, serif";
const sans = "'Jost', Helvetica, Arial, sans-serif";

const IMG = [
  '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
  '6.jpg', '7.jpg', '8.jpg', '9.jpg',
];

const Btn = ({ children, variant = 'primary', size = 'md', onClick, style = {}, href }) => {
  const [hov, setHov] = React.useState(false);
  const [press, setPress] = React.useState(false);

  const sizes = {
    sm: { padding: '8px 22px', fontSize: 13, minHeight: 36 },
    md: { padding: '13px 28px', fontSize: 15, minHeight: 44 },
    lg: { padding: '16px 38px', fontSize: 16, minHeight: 52 },
  };

  const variants = {
    primary: {
      background: hov ? T.blushDp : T.blush,
      color: '#fff',
      boxShadow: hov ? '0 6px 28px rgba(226,163,180,0.55)' : '0 4px 20px rgba(246,201,212,0.45)',
    },
    rose: {
      background: hov ? T.roseDp : T.rose,
      color: '#fff',
      boxShadow: hov ? '0 6px 28px rgba(185,126,143,0.4)' : '0 4px 20px rgba(226,163,180,0.3)',
    },
    ghost: {
      background: hov ? T.bgAlt : 'transparent',
      color: T.text,
      border: `1.5px solid ${T.border}`,
    },
    dark: {
      background: hov ? '#6a8074' : T.darkDeep,
      color: '#fff',
      boxShadow: hov ? '0 6px 28px rgba(124,148,133,0.45)' : '0 4px 20px rgba(124,148,133,0.26)',
    },
    darkOutline: {
      background: 'transparent',
      color: hov ? '#fff' : 'rgba(255,255,255,0.8)',
      border: `1.5px solid ${hov ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.4)'}`,
    },
    outline: {
      background: 'transparent',
      color: hov ? T.roseDp : T.darkDeep,
      border: `2px solid ${T.darkDeep}`,
    },
  };

  const el = href ? 'a' : 'button';
  const props = {
    href,
    target: href ? '_blank' : undefined,
    rel: href ? 'noopener noreferrer' : undefined,
    onClick,
    style: {
      display: 'inline-flex',
      alignItems: 'center',
      justifyContent: 'center',
      fontFamily: sans,
      fontWeight: 500,
      letterSpacing: '0.05em',
      borderRadius: 999,
      border: 'none',
      cursor: 'pointer',
      textDecoration: 'none',
      transition: 'all 0.2s ease',
      whiteSpace: 'nowrap',
      transform: press ? 'scale(0.97)' : 'scale(1)',
      ...sizes[size],
      ...variants[variant],
      ...style,
    },
    onMouseEnter: () => setHov(true),
    onMouseLeave: () => { setHov(false); setPress(false); },
    onMouseDown: () => setPress(true),
    onMouseUp: () => setPress(false),
  };

  return React.createElement(el, props, children);
};

const Logo = ({ onClick }) => (
  <div onClick={onClick} style={{ cursor: 'pointer', display: 'flex', flexDirection: 'column', lineHeight: 1 }}>
    <span style={{ fontFamily: serif, fontSize: 11, fontWeight: 400, letterSpacing: '0.22em', textTransform: 'uppercase', color: T.roseDp, marginBottom: 1 }}>
      by Ivy
    </span>
    <span style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, letterSpacing: '0.04em', color: T.text, lineHeight: 1 }}>
      b.koolll
    </span>
  </div>
);

const Header = ({ page, onNav }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const headerRef = React.useRef();
  const logoRef = React.useRef();

  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);

    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && logoRef.current) {
      gsap.fromTo(
        logoRef.current,
        { opacity: 0, y: -20 },
        { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out', delay: 0.2 }
      );
    }

    return () => window.removeEventListener('scroll', fn);
  }, []);

  const links = ['Services', 'Gallery', 'About'];
  const isLight = !scrolled && !mobileOpen;

  return (
    <>
      <header
        ref={headerRef}
        style={{
          position: 'fixed',
          top: 0,
          left: 0,
          right: 0,
          zIndex: 100,
          height: 64,
          display: 'flex',
          alignItems: 'center',
          padding: '0 clamp(20px,5vw,64px)',
          background: scrolled || mobileOpen ? 'rgba(255,253,249,0.97)' : 'transparent',
          backdropFilter: scrolled ? 'blur(20px)' : 'none',
          borderBottom: scrolled ? `1px solid ${T.border}` : 'none',
          transition: 'background 0.4s ease, border-color 0.4s ease, backdrop-filter 0.4s ease',
          boxShadow: scrolled ? '0 2px 20px rgba(51,64,58,0.06)' : 'none',
        }}
      >
        <div ref={logoRef} style={{ marginRight: 'auto' }}>
          <Logo onClick={() => { onNav('home'); setMobileOpen(false); }} />
        </div>

        <nav className="desktop-nav" style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
          {links.map((l) => (
            <span
              key={l}
              onClick={() => onNav(l.toLowerCase())}
              style={{
                fontSize: 13,
                fontWeight: 400,
                letterSpacing: '0.08em',
                cursor: 'pointer',
                padding: '0 16px',
                color: page === l.toLowerCase()
                  ? (isLight ? '#fff' : T.text)
                  : (isLight ? 'rgba(255,255,255,0.68)' : T.text2),
                borderBottom: page === l.toLowerCase() ? `1px solid ${isLight ? '#fff' : T.rose}` : '1px solid transparent',
                transition: 'color 0.2s, border-color 0.2s',
              }}
              onMouseEnter={(e) => { e.target.style.color = isLight ? '#fff' : T.text; }}
              onMouseLeave={(e) => {
                e.target.style.color = page === l.toLowerCase()
                  ? (isLight ? '#fff' : T.text)
                  : (isLight ? 'rgba(255,255,255,0.68)' : T.text2);
              }}
            >
              {l}
            </span>
          ))}
          <Btn href={BOOKING_URL} size="sm" style={{ marginLeft: 12 }}>DM to Book</Btn>
        </nav>

        <button
          className="mobile-menu-btn"
          onClick={() => setMobileOpen((o) => !o)}
          style={{
            background: 'none',
            border: 'none',
            cursor: 'pointer',
            padding: 8,
            display: 'flex',
            flexDirection: 'column',
            gap: 5,
            alignItems: 'center',
            justifyContent: 'center',
          }}
          aria-label="Toggle menu"
        >
          {[0, 1, 2].map((i) => (
            <span
              key={i}
              style={{
                display: 'block',
                width: 22,
                height: 1.5,
                background: isLight ? '#fff' : T.text,
                borderRadius: 1,
                transition: 'all 0.3s ease',
                transform: mobileOpen
                  ? (i === 0 ? 'rotate(45deg) translate(5px,5px)' : i === 2 ? 'rotate(-45deg) translate(5px,-5px)' : 'scaleX(0)')
                  : 'none',
                opacity: mobileOpen && i === 1 ? 0 : 1,
              }}
            />
          ))}
        </button>
      </header>

      {mobileOpen && (
        <div
          style={{
            position: 'fixed',
            top: 64,
            left: 0,
            right: 0,
            zIndex: 99,
            background: 'rgba(255,253,249,0.98)',
            backdropFilter: 'blur(20px)',
            padding: '24px clamp(20px,5vw,40px) 32px',
            display: 'flex',
            flexDirection: 'column',
            gap: 4,
            borderBottom: `1px solid ${T.border}`,
          }}
        >
          {links.map((l) => (
            <button
              key={l}
              onClick={() => { onNav(l.toLowerCase()); setMobileOpen(false); }}
              style={{
                background: 'none',
                border: 'none',
                cursor: 'pointer',
                textAlign: 'left',
                padding: '14px 0',
                fontFamily: sans,
                fontSize: 18,
                fontWeight: 400,
                letterSpacing: '0.06em',
                color: page === l.toLowerCase() ? T.text : T.text2,
                borderBottom: `1px solid ${T.border}`,
              }}
            >
              {l}
            </button>
          ))}
          <div style={{ marginTop: 20 }}>
            <Btn href={BOOKING_URL} size="lg" style={{ width: '100%' }}>DM to Book</Btn>
          </div>
        </div>
      )}
    </>
  );
};

const Hero = ({ onServices }) => {
  const heroRef = React.useRef();
  const contentRef = React.useRef();

  React.useEffect(() => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return undefined;

    const ctx = gsap.context(() => {
      const heroItems = contentRef.current?.querySelectorAll('[data-hero]');
      if (!heroItems?.length) return;

      gsap.fromTo(
        heroItems,
        { opacity: 0, y: 32 },
        { opacity: 1, y: 0, duration: 0.8, stagger: 0.15, ease: 'power2.out' }
      );
    }, heroRef);

    return () => ctx.revert();
  }, []);

  return (
    <section
      ref={heroRef}
      style={{
        minHeight: '100vh',
        position: 'relative',
        overflow: 'hidden',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}
    >
      <div
        style={{
          position: 'absolute',
          inset: '-10%',
          zIndex: 0,
          backgroundImage: `url(${IMG[0]})`,
          backgroundSize: 'cover',
          backgroundPosition: 'center top',
          willChange: 'transform',
        }}
      />
      <div style={{ position: 'absolute', inset: 0, zIndex: 1, background: 'linear-gradient(160deg,rgba(251,248,242,0.78) 0%,rgba(255,253,249,0.66) 48%,rgba(124,148,133,0.55) 100%)' }} />

      <div ref={contentRef} style={{ maxWidth: 780, textAlign: 'center', position: 'relative', zIndex: 2, padding: '120px clamp(24px,8vw,80px) 80px' }}>
        <div data-hero style={{ fontFamily: sans, fontSize: 11, fontWeight: 500, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.roseDp, marginBottom: 24 }}>
          Nail Artist &middot; Phoenix, AZ
        </div>
        <h1 data-hero style={{ fontFamily: serif, fontSize: 'clamp(52px,7.5vw,96px)', fontWeight: 600, lineHeight: 1.02, letterSpacing: '-0.01em', color: T.text, marginBottom: 8 }}>
          Hey!<br />It&apos;s Ivy.
        </h1>
        <div data-hero style={{ fontFamily: serif, fontStyle: 'italic', fontSize: 'clamp(22px,3vw,38px)', fontWeight: 300, color: T.roseDp, marginBottom: 28, lineHeight: 1.3 }}>
          Soft sets, delicate art, made just for you.
        </div>
        <p style={{ fontFamily: sans, fontSize: 'clamp(14px,1.4vw,17px)', color: T.text2, lineHeight: 1.75, maxWidth: 520, margin: '0 auto 44px', fontWeight: 300 }}>
          b.koolll is where dainty florals, soft French tips, and little hand-painted details come together - one set at a time.
        </p>
        <div data-hero className="hero-ctas" style={{ display: 'flex', gap: 14, justifyContent: 'center', flexWrap: 'wrap' }}>
          <Btn href={BOOKING_URL} size="lg">DM to book</Btn>
          <Btn onClick={onServices} variant="ghost" size="lg">Our services</Btn>
        </div>
        <div className="stats-row" style={{ display: 'flex', gap: 48, justifyContent: 'center', marginTop: 64, flexWrap: 'wrap' }}>
          {[['Gel-X', 'Full Sets'], ['French', 'Tips'], ['Nail Art', 'Add-on']].map(([n, l]) => (
            <div key={l + n} style={{ textAlign: 'center' }}>
              <div style={{ fontFamily: serif, fontSize: 26, fontWeight: 600, color: T.text, letterSpacing: '-0.01em' }}>{n}</div>
              <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 500, color: T.text3, letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 4 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const servicesData = [
  {
    label: 'Gel-X',
    name: 'Gel-X Full Set',
    desc: 'Lightweight full-cover extensions for soft, natural length with a clean, polished finish that feels comfortable all day.',
    dur: '~105 min',
    img: IMG[0],
  },
  {
    label: 'French Tips',
    name: 'Modern French Set',
    desc: 'Classic French tips with a soft twist - color accents, fine lines, and delicate detailing for an elevated everyday look.',
    dur: '~90 min',
    img: IMG[1],
  },
  {
    label: 'Nail Art',
    name: 'Hand-Painted Florals',
    desc: 'Delicate florals, butterflies, and polka dots hand-painted onto your set for a soft, feminine, nature-inspired finish.',
    dur: 'varies',
    img: IMG[2],
  },
  {
    label: 'Seasonal',
    name: 'Seasonal Nail Art',
    desc: 'Starfish, shells, bows, and hearts - fun seasonal sets designed around whatever the moment calls for.',
    dur: 'varies',
    img: IMG[3],
  },
];

const ServiceCard = ({ s }) => {
  const [hov, setHov] = React.useState(false);

  return (
    <div
      data-service-card
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: T.white,
        borderRadius: 12,
        boxShadow: hov ? '0 12px 40px rgba(51,64,58,0.10)' : '0 2px 14px rgba(51,64,58,0.05)',
        transform: hov ? 'translateY(-4px)' : 'translateY(0)',
        transition: 'all 0.3s ease',
        overflow: 'hidden',
        display: 'flex',
        flexDirection: 'column',
      }}
    >
      <div style={{ height: 180, overflow: 'hidden', flexShrink: 0, position: 'relative' }}>
        <img
          src={s.img}
          alt={s.name}
          loading="lazy"
          style={{
            width: '100%',
            height: '100%',
            objectFit: 'cover',
            transform: hov ? 'scale(1.06)' : 'scale(1)',
            transition: 'transform 0.5s ease',
          }}
        />
        <div style={{ position: 'absolute', inset: 0, background: hov ? 'rgba(246,201,212,0.16)' : 'transparent', transition: 'background 0.3s' }} />
      </div>
      <div style={{ padding: '20px 22px 24px', flex: 1, display: 'flex', flexDirection: 'column' }}>
        <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 500, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.rose, marginBottom: 7 }}>{s.label}</div>
        <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 500, color: T.text, marginBottom: 8 }}>{s.name}</div>
        <div style={{ fontFamily: sans, fontSize: 13, fontWeight: 300, color: T.text2, lineHeight: 1.65, flex: 1, marginBottom: 18 }}>{s.desc}</div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 400, color: T.text3, letterSpacing: '0.04em' }}>{s.dur}</div>
          <Btn href={BOOKING_URL} size="sm" variant="rose">Book</Btn>
        </div>
      </div>
    </div>
  );
};

const Services = () => {
  const cardsRef = React.useRef();

  React.useEffect(() => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches || !cardsRef.current) return undefined;

    const ctx = gsap.context(() => {
      const cards = cardsRef.current.querySelectorAll('[data-service-card]');
      if (!cards.length) return;

      gsap.fromTo(
        cards,
        { opacity: 0, y: 36 },
        {
          opacity: 1,
          y: 0,
          duration: 0.8,
          stagger: 0.2,
          ease: 'power2.out',
          scrollTrigger: {
            trigger: cardsRef.current,
            start: 'top 80%',
            once: true,
          },
        }
      );
    }, cardsRef);

    return () => ctx.revert();
  }, []);

  return (
    <section style={{ padding: 'clamp(64px,8vw,120px) clamp(24px,5vw,80px)', background: T.bgAlt }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 56 }}>
          <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 500, letterSpacing: '0.16em', textTransform: 'uppercase', color: T.rose, marginBottom: 14 }}>What we do</div>
          <h2 style={{ fontFamily: serif, fontSize: 'clamp(32px,4vw,52px)', fontWeight: 500, color: T.text, letterSpacing: '-0.01em', lineHeight: 1.1, marginBottom: 16 }}>Our services</h2>
          <p style={{ fontFamily: sans, fontSize: 16, fontWeight: 300, color: T.text2, maxWidth: 460, margin: '0 auto', lineHeight: 1.7 }}>
            Gel-X, French tips, and hand-painted nail art for clients who love a soft, delicate set.
          </p>
        </div>
        <div ref={cardsRef} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(270px,340px))', justifyContent: 'center', gap: 20 }}>
          {servicesData.map((s) => <ServiceCard key={s.name} s={s} />)}
        </div>
      </div>
    </section>
  );
};

const galleryPattern = [
  { col: 'span 2', row: 'span 1' },
  { col: 'span 1', row: 'span 2' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 1', row: 'span 1' },
  { col: 'span 2', row: 'span 1' },
];

const galleryLayout = IMG.filter(Boolean).map((img, index) => ({
  img,
  ...(galleryPattern[index] || { col: 'span 1', row: 'span 1' }),
}));

const Gallery = ({ fullGrid = false }) => {
  const [lightbox, setLightbox] = React.useState({ open: false, idx: 0 });
  const gridRef = React.useRef();
  const items = fullGrid ? galleryLayout : galleryLayout.slice(0, Math.min(6, galleryLayout.length));

  React.useEffect(() => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches || !gridRef.current) return undefined;

    const ctx = gsap.context(() => {
      const imgs = gridRef.current.querySelectorAll('.gallery-item');
      if (!imgs.length) return;

      gsap.fromTo(
        imgs,
        { opacity: 0, scale: 0.95 },
        {
          opacity: 1,
          scale: 1,
          duration: 0.6,
          stagger: 0.15,
          ease: 'power2.out',
          scrollTrigger: { trigger: gridRef.current, start: 'top 80%', once: true },
        }
      );
    }, gridRef);

    return () => ctx.revert();
  }, [fullGrid]);

  const openLB = (idx) => setLightbox({ open: true, idx });
  const closeLB = () => setLightbox((l) => ({ ...l, open: false }));
  const prevLB = () => setLightbox((l) => ({ ...l, idx: (l.idx - 1 + items.length) % items.length }));
  const nextLB = () => setLightbox((l) => ({ ...l, idx: (l.idx + 1) % items.length }));

  React.useEffect(() => {
    const fn = (e) => {
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') prevLB();
      if (e.key === 'ArrowRight') nextLB();
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [items.length]);

  return (
    <section style={{ padding: 'clamp(64px,8vw,120px) clamp(24px,5vw,80px)', background: T.white }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 40, flexWrap: 'wrap', gap: 16 }}>
          <div>
            <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 500, letterSpacing: '0.16em', textTransform: 'uppercase', color: T.rose, marginBottom: 12 }}>Portfolio</div>
            <h2 style={{ fontFamily: serif, fontSize: 'clamp(28px,3.5vw,48px)', fontWeight: 500, color: T.text, letterSpacing: '-0.01em', lineHeight: 1.1 }}>Signature sets</h2>
          </div>
          <span style={{ fontFamily: sans, fontSize: 13, fontWeight: 400, color: T.rose, cursor: 'pointer', borderBottom: `1px solid ${T.rose}`, paddingBottom: 2, letterSpacing: '0.04em' }}>View all -&gt;</span>
        </div>

        <div
          ref={gridRef}
          className="gallery-grid"
          style={{
            display: 'grid',
            gridTemplateColumns: fullGrid ? 'repeat(4,1fr)' : 'repeat(3,1fr)',
            gridAutoRows: '200px',
            gap: 10,
          }}
        >
          {items.map((item, i) => (
            <div
              key={i}
              className={`gallery-item${item.col === 'span 2' ? ' gallery-wide' : ''}${item.row === 'span 2' ? ' gallery-tall' : ''}`}
              onClick={() => openLB(i)}
              style={{
                gridColumn: item.col,
                gridRow: item.row,
                overflow: 'hidden',
                borderRadius: 10,
                cursor: 'pointer',
                position: 'relative',
              }}
            >
              <img
                src={item.img}
                alt={`b.koolll set ${i + 1}`}
                loading="lazy"
                style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.5s ease', display: 'block' }}
                onMouseEnter={(e) => { e.target.style.transform = 'scale(1.05)'; }}
                onMouseLeave={(e) => { e.target.style.transform = 'scale(1)'; }}
              />
              <div
                style={{
                  position: 'absolute',
                  inset: 0,
                  background: 'rgba(0,0,0,0)',
                  transition: 'background 0.3s',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.background = 'rgba(51,64,58,0.18)';
                  e.currentTarget.querySelector('.gallery-icon').style.opacity = '1';
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.background = 'rgba(0,0,0,0)';
                  e.currentTarget.querySelector('.gallery-icon').style.opacity = '0';
                }}
              >
                <div
                  className="gallery-icon"
                  style={{
                    opacity: 0,
                    transition: 'opacity 0.3s',
                    width: 44,
                    height: 44,
                    border: `1.5px solid ${T.blush}`,
                    borderRadius: '50%',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    color: T.blush,
                    fontSize: 20,
                  }}
                >
                  +
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className={`lightbox-overlay ${lightbox.open ? 'open' : ''}`} onClick={(e) => e.target === e.currentTarget && closeLB()}>
        <span className="lightbox-close" onClick={closeLB}>x</span>
        <span className="lightbox-nav prev" onClick={prevLB}>&lt;</span>
        {lightbox.open && <img src={items[lightbox.idx]?.img} alt="" />}
        <span className="lightbox-nav next" onClick={nextLB}>&gt;</span>
      </div>
    </section>
  );
};
